    :root{
      --cream:#FFFDF7; --brown:#4A3324;
      --green-deep:#357A52; --green-soft:#8FA894;
      --line:#E7ECE3; --r:3px;
    }
    *,*::before,*::after{box-sizing:border-box}
    body{
      margin:0; background:var(--cream); color:var(--green-deep);
      font:18px/1.6 'Brandon Grotesque', system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
      -webkit-font-smoothing:antialiased; overflow-x:hidden;
      display:flex; align-items:center; justify-content:center;
      min-height:100vh; padding:24px;
    }

    .container{ max-width:560px; text-align:center; }

    .logo{ position:fixed; bottom:22px; left:26px; width:120px; height:auto; z-index:10; }

    .icon{ width:260px; height:auto; display:block; margin:0 auto 36px; }

    .message{
      font-size:19px; color:var(--green-soft); line-height:1.6;
      margin:0 auto 30px; max-width:42ch;
    }

    .tele-btn{
      display:inline-flex; align-items:center; gap:10px;
      appearance:none; border:1px solid var(--green-deep); border-radius:var(--r);
      padding:14px 28px; background:var(--green-deep); color:var(--cream);
      font-family:inherit; font-weight:700; font-size:17px;
      cursor:pointer; text-decoration:none; transition:background .15s ease;
    }
    @media (hover: hover) and (pointer: fine){
      .tele-btn:hover{ background:#2c6644; border-color:#2c6644; }
    }
    .tele-btn svg{ display:block; }

    @media (max-width:600px){
      .logo{ width:88px; bottom:14px; left:16px; }
      .icon{ width:210px; margin-bottom:28px; }
      .message{ font-size:17px; }
    }
  </style>
</head>
